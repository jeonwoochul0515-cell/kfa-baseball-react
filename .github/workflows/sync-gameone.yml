name: GameOne 자동 동기화

on:
  schedule:
    # 매주 토요일, 일요일 저녁 8시 (KST) = UTC 11:00
    - cron: '0 11 * * 6,0'
  workflow_dispatch: # 수동 실행도 가능

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run GameOne sync
        run: node scripts/sync-gameone.js

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet src/data/teamData.ts; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "변경사항 없음"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "변경사항 감지!"
            git diff --stat src/data/teamData.ts
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/teamData.ts
          git commit -m "auto: 게임원 경기 결과/일정 자동 동기화 $(date +%Y-%m-%d)"
          git push
